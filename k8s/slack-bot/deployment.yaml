apiVersion: apps/v1
kind: Deployment
metadata:
  name: slack-bot
  labels:
    app: slack-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slack-bot
  template:
    metadata:
      labels:
        app: slack-bot
    spec:
      containers:
      - name: slack-bot
        image: slack-bot:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: slack-bot-secrets
        env:
        - name: MCP_SERVER_URL
          value: "http://mcp-service:8000/sse"
---
apiVersion: v1
kind: Service
metadata:
  name: slack-bot
spec:
  type: LoadBalancer
  selector:
    app: slack-bot
  ports:
  - port: 3000
    targetPort: 3000
