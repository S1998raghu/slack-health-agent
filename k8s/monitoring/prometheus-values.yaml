# Values used to install kube-prometheus-stack
# helm install prometheus prometheus-community/kube-prometheus-stack \
#   --namespace monitoring --create-namespace -f prometheus-values.yaml

prometheus:
  prometheusSpec:
    # Use standard image (not distroless) for Docker Desktop compatibility
    image:
      registry: quay.io
      repository: prometheus/prometheus
      tag: v3.12.0
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'job']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      receiver: slack-webhook
    receivers:
    - name: slack-webhook
      webhook_configs:
      - url: "http://slack-bot.default.svc.cluster.local:3000/alert"
        send_resolved: true

nodeExporter:
  # Disable node-exporter — crashes on Docker Desktop (Mac)
  enabled: false

grafana:
  enabled: false
