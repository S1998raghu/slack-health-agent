apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotrod
  namespace: hotrod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hotrod
  template:
    metadata:
      labels:
        app: hotrod
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: hotrod
        image: jaegertracing/example-hotrod:latest
        args: ["all"]
        ports:
        - containerPort: 8080
        - containerPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: hotrod
  namespace: hotrod
  labels:
    app: hotrod
spec:
  selector:
    app: hotrod
  ports:
  - name: frontend
    port: 8080
    targetPort: 8080
